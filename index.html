<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Hello World</title>
</head>
<body>

    <div id="app"></div>

    <script>
        // Criamos os dados em um objeto para organizar melhor
        const informacoes = [
            "Praticar manipulação de DOM",
            "Estudar estrutura de HTML",
            "Aprender Git Flow"
        ];

        // Injetamos tudo de uma vez no HTML
        // Isso remove a necessidade de 4 linhas de getElementById
        document.getElementById("app").innerHTML = `
            <h1>Hello, World!</h1>
            <p>Aplicação teste, criada com o objetivo de praticar conhecimentos</p>
            <h3>Itens de descrição:</h3>
            <ul>
                ${informacoes.map(item => `<li>${item}</li>`).join('')}
            </ul>
        `;
    </script>

</body>
</html>
